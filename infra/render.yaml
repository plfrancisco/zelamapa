services:
  # --- BANCO DE DADOS (MySQL) ---
  - type: database
    name: zelamapa-db
    databaseName: zelamapa
    user: zelamapa_user
    plan: free # Verifique a disponibilidade do plano free para MySQL no Render

  # --- BACKEND (FastAPI) ---
  - type: web
    name: zelamapa-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zelamapa-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DB_TYPE
        value: mysql

  # --- FRONTEND (React) ---
  - type: web
    name: zelamapa-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: zelamapa-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
